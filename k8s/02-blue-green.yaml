# BLUE deployment (current production - v4.0)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
  labels:
    app: aceest-bg
    color: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-bg
      color: blue
  template:
    metadata:
      labels:
        app: aceest-bg
        color: blue
    spec:
      containers:
      - name: aceest
        image: ihyth32/aceest-fitness:v4.0
        ports:
        - containerPort: 5000
---
# GREEN deployment (new version - latest)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-green
  labels:
    app: aceest-bg
    color: green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-bg
      color: green
  template:
    metadata:
      labels:
        app: aceest-bg
        color: green
    spec:
      containers:
      - name: aceest
        image: ihyth32/aceest-fitness:latest
        ports:
        - containerPort: 5000
---
# Service points to BLUE initially
apiVersion: v1
kind: Service
metadata:
  name: aceest-bg-service
spec:
  type: NodePort
  selector:
    app: aceest-bg
    color: blue   # <-- switch this to "green" to cut traffic over
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30081