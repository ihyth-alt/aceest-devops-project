# Production (real users)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-prod
  labels:
    app: aceest-shadow
    role: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-shadow
      role: production
  template:
    metadata:
      labels:
        app: aceest-shadow
        role: production
    spec:
      containers:
      - name: aceest
        image: ihyth32/aceest-fitness:v4.0
        ports:
        - containerPort: 5000
---
# Shadow (receives mirrored traffic for testing)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow
  labels:
    app: aceest-shadow
    role: shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-shadow
      role: shadow
  template:
    metadata:
      labels:
        app: aceest-shadow
        role: shadow
    spec:
      containers:
      - name: aceest
        image: ihyth32/aceest-fitness:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-prod-svc
spec:
  type: NodePort
  selector:
    app: aceest-shadow
    role: production
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30085
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-shadow-svc
spec:
  type: NodePort
  selector:
    app: aceest-shadow
    role: shadow
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30086