apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-rolling
  labels:
    app: aceest
    strategy: rolling
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aceest
  template:
    metadata:
      labels:
        app: aceest
        version: v1
    spec:
      containers:
      - name: aceest-fitness
        image: ihyth32/aceest-fitness:latest
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-service
  labels:
    app: aceest
spec:
  type: NodePort
  selector:
    app: aceest
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30080