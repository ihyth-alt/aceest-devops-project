# Stable version - 90% of traffic (4 replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  labels:
    app: aceest-canary
    track: stable
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aceest-canary
      track: stable
  template:
    metadata:
      labels:
        app: aceest-canary
        track: stable
    spec:
      containers:
      - name: aceest
        image: ihyth32/aceest-fitness:v4.0
        ports:
        - containerPort: 5000
---
# Canary version - 10% of traffic (1 replica)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
  labels:
    app: aceest-canary
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-canary
      track: canary
  template:
    metadata:
      labels:
        app: aceest-canary
        track: canary
    spec:
      containers:
      - name: aceest
        image: ihyth32/aceest-fitness:latest
        ports:
        - containerPort: 5000
---
# Service routes to BOTH stable + canary by app label
apiVersion: v1
kind: Service
metadata:
  name: aceest-canary-service
spec:
  type: NodePort
  selector:
    app: aceest-canary   # matches both stable and canary
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30082