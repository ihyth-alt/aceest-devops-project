# Version A (default users)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-version-a
  labels:
    app: aceest-ab
    version: a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-ab
      version: a
  template:
    metadata:
      labels:
        app: aceest-ab
        version: a
    spec:
      containers:
      - name: aceest
        image: ihyth32/aceest-fitness:v4.0
        ports:
        - containerPort: 5000
---
# Version B (test users)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-version-b
  labels:
    app: aceest-ab
    version: b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-ab
      version: b
  template:
    metadata:
      labels:
        app: aceest-ab
        version: b
    spec:
      containers:
      - name: aceest
        image: ihyth32/aceest-fitness:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-version-a-svc
spec:
  type: NodePort
  selector:
    app: aceest-ab
    version: a
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30083
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-version-b-svc
spec:
  type: NodePort
  selector:
    app: aceest-ab
    version: b
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30084